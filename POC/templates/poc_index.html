<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CodeGuard Dashboard</title>

  <style>

    :root {

      --bg-main: #050505;
      --bg-card: #0f1115;
      --bg-input: #141821;
      --bg-response: #0b0f17;

      --border-color: rgba(111, 255, 228, 0.18);

      --text-main: #f3f4f6;
      --text-secondary: #9ca3af;

      --accent-primary: #4fffe0;
      --accent-secondary: #b8ffb0;

      --glow-primary: 0 0 18px rgba(79, 255, 224, 0.45);
    }

    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {

      margin: 0;
      padding: 30px;

      background:
        radial-gradient(circle at top left,
        rgba(79,255,224,0.08),
        transparent 25%),

        radial-gradient(circle at bottom right,
        rgba(184,255,176,0.08),
        transparent 25%),

        var(--bg-main);

      color: var(--text-main);
      min-height: 100vh;
    }

    .header {

      display: flex;
      align-items: center;
      gap: 20px;

      margin-bottom: 35px;
    }

    .header img {

      width: 120px;

      filter:
        drop-shadow(0 0 12px rgba(79,255,224,0.35));
    }

    h1 {

      margin: 0;

      font-size: 42px;
      font-weight: 800;

      background: linear-gradient(
        90deg,
        var(--accent-primary),
        var(--accent-secondary)
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow: var(--glow-primary);
    }

    .subtitle {

      color: var(--text-secondary);
      margin-top: 8px;
    }

    .container {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(460px, 1fr));

      gap: 24px;
    }

    .card {

      background: linear-gradient(
        145deg,
        rgba(20,24,33,0.95),
        rgba(10,14,20,0.98)
      );

      border-radius: 18px;

      padding: 22px;

      border: 1px solid var(--border-color);

      box-shadow:
        0 8px 30px rgba(0,0,0,0.45),
        0 0 25px rgba(79,255,224,0.05);

      transition: 0.25s ease;
    }

    .card:hover {

      transform: translateY(-4px);

      border-color:
        rgba(79,255,224,0.4);

      box-shadow:
        0 12px 35px rgba(0,0,0,0.55),
        0 0 30px rgba(79,255,224,0.12);
    }

    .card h2 {

      margin-top: 0;
      margin-bottom: 8px;

      font-size: 22px;

      color: var(--accent-primary);
    }

    .url {

      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 16px;

      word-break: break-all;
    }

    .controls {

      display: flex;
      gap: 10px;
      margin-bottom: 12px;

      flex-wrap: wrap;
    }

    select {

      padding: 10px 12px;

      border-radius: 10px;

      border: 1px solid rgba(79,255,224,0.2);

      background: var(--bg-input);

      color: var(--text-main);

      outline: none;

      min-width: 220px;
    }

    textarea {

      width: 100%;

      min-height: 220px;

      resize: vertical;

      border:
        1px solid rgba(79,255,224,0.18);

      border-radius: 14px;

      padding: 14px;

      font-family: monospace;

      font-size: 14px;

      background: var(--bg-input);

      color: #d1fae5;

      outline: none;
    }

    textarea:focus {

      border-color: var(--accent-primary);

      box-shadow: var(--glow-primary);
    }

    button {

      margin-top: 18px;

      padding: 12px 18px;

      border: none;

      border-radius: 12px;

      background: linear-gradient(
        90deg,
        var(--accent-primary),
        var(--accent-secondary)
      );

      color: #03130f;

      cursor: pointer;

      font-size: 14px;

      font-weight: 800;

      transition: 0.25s;

      box-shadow: var(--glow-primary);
    }

    button:hover {

      transform:
        translateY(-2px)
        scale(1.02);
    }

    .response {

      margin-top: 16px;

      background: var(--bg-response);

      color: #d1fae5;

      padding: 14px;

      border-radius: 14px;

      min-height: 90px;

      white-space: pre-wrap;

      overflow-x: auto;

      font-family: monospace;

      font-size: 13px;

      border:
        1px solid rgba(79,255,224,0.12);
    }

    .hint {

      margin-top: 10px;

      font-size: 12px;

      color: #7c8a99;
    }

    table {

      width: 100%;

      border-collapse: collapse;

      margin-top: 10px;

      border-radius: 12px;

      overflow: hidden;
    }

    th {

      background:
        rgba(79,255,224,0.12);

      color: var(--accent-primary);

      text-align: left;

      padding: 12px;

      font-size: 14px;

      border-bottom:
        1px solid rgba(79,255,224,0.15);
    }

    td {

      padding: 12px;

      border-bottom:
        1px solid rgba(255,255,255,0.05);

      color: #d1fae5;

      font-size: 13px;
    }

    tr:hover {

      background:
        rgba(79,255,224,0.04);
    }

    ::-webkit-scrollbar {

      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-thumb {

      background: linear-gradient(
        var(--accent-primary),
        var(--accent-secondary)
      );

      border-radius: 20px;
    }

  </style>
</head>

<body>

  <div class="header">

    <img
      src="{{ url_for('static',
      filename='images/CodeGuard_logo.png') }}"
    />

    <div>

      <h1>CodeGuard</h1>

      <div class="subtitle">
        AI Similarity & Homework Validation API
      </div>

    </div>

  </div>

  <div class="container" id="container"></div>

  <script>

    const API_BASE =
      "http://localhost:4999/poc";

    const endpoints = {

      check_similarity: {

        title: "/check_similarity",

        templates: {

          "Basic": {
            solution_ids: [1,2]
          },

          "Large Batch": {
            solution_ids: [3,4,5,6,7,8]
          }
        }
      },

      check_homework: {

        title: "/check_homework",

        templates: {

          "Basic": {

            user_ids: ["eric.mester","RaulFeier", "Dani111"],

            problem_ids: ["/problems/90","/problems/175"]
          }
        }
      },

      submit_and_check: {

        title: "/submit_and_check",

        templates: {

          "Basic": {

                previous_submissions: [],
                current_submission: {
                    solution_id: 8,
                    user_id: "eric.mester",
                    problem_id: "/problems/",
                    score: "100",
                    timestamp: "32000",
                    text: "..."
                }

          }
        }
      },

      get_weird_percent: {

        title: "/get_weird_percent",

        templates: {

          "Basic": {
            solution_id: 16
          }
        }
      },

      recheck_weird_percent: {

        title: "/recheck_weird_percent",

        templates: {

          "Basic": {

            previous_submissions:
              [11,12,13,14,15],

            current_submission: 16
          }
        }
      }
    };

    const container =
      document.getElementById("container");

    Object.keys(endpoints).forEach(endpoint => {

      const config = endpoints[endpoint];

      const card =
        document.createElement("div");

      card.className = "card";

      const templateNames =
        Object.keys(config.templates);

      card.innerHTML = `

        <h2>${config.title}</h2>

        <div class="url">
          POST ${API_BASE}/${endpoint}
        </div>

        <div class="controls">

          <select
            id="${endpoint}_template">

            ${templateNames.map(name =>

              `<option value="${name}">
                ${name}
              </option>`

            ).join("")}

          </select>

        </div>

        <textarea
          id="${endpoint}_body">
        </textarea>

        <div class="hint">
          Payload-ul poate fi editat manual.
        </div>

        <button
          onclick="sendRequest('${endpoint}')">

          Send Request

        </button>

        <div
          class="response"
          id="${endpoint}_response">
        </div>
      `;

      container.appendChild(card);

      const select =
        document.getElementById(
          `${endpoint}_template`
        );

      const textarea =
        document.getElementById(
          `${endpoint}_body`
        );

      function loadTemplate() {

        const selected = select.value;

        textarea.value = JSON.stringify(
          config.templates[selected],
          null,
          2
        );
      }

      select.addEventListener(
        "change",
        loadTemplate
      );

      loadTemplate();
    });

    // DATABASE VIEWER

    const dbCard =
      document.createElement("div");

    dbCard.className = "card";

    dbCard.innerHTML = `

      <h2>Database Viewer</h2>

      <div class="controls">

        <select id="table_selector">

          <option value="solutions">
            solutions
          </option>

        </select>

      </div>

      <button onclick="loadDatabaseTable()">

        Load Table

      </button>

      <div
        id="database_table_container"

        style="
          margin-top:20px;
          overflow:auto;
          max-height:500px;
        ">
      </div>
    `;

    container.appendChild(dbCard);

    async function sendRequest(endpoint) {

      const bodyElement =
        document.getElementById(
          endpoint + "_body"
        );

      const responseElement =
        document.getElementById(
          endpoint + "_response"
        );

      let payload;

      try {

        payload =
          JSON.parse(bodyElement.value);

      } catch (err) {

        responseElement.innerText =
          "JSON invalid:\n\n" + err.message;

        return;
      }

      responseElement.innerText =
        "Loading...";

      try {

        const response = await fetch(

          `${API_BASE}/${endpoint}`,

          {
            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify(payload)
          }
        );

        const text =
          await response.text();

        try {

          const json =
            JSON.parse(text);

          responseElement.innerText =
            JSON.stringify(
              json,
              null,
              2
            );

        } catch {

          responseElement.innerText =
            text;
        }

      } catch (err) {

        responseElement.innerText =
          "Request failed:\n\n" +
          err.message;
      }
    }

    async function loadDatabaseTable() {

      const container =
        document.getElementById(
          "database_table_container"
        );

      const tableName =
        document.getElementById(
          "table_selector"
        ).value;

      container.innerHTML =
        "Loading table...";

      try {

        const response = await fetch(

          `${API_BASE}/get_table/${tableName}`
        );

        const data =
          await response.json();

        if (!data.length) {

          container.innerHTML =
            "<p>No rows found.</p>";

          return;
        }

        const columns =
          Object.keys(data[0]);

        let html = "<table>";

        // HEADER

        html += "<thead><tr>";

        columns.forEach(col => {

          html += `<th>${col}</th>`;
        });

        html += "</tr></thead>";

        // BODY

        html += "<tbody>";

        data.forEach(row => {

          html += "<tr>";

          columns.forEach(col => {

            html += `
              <td>${row[col]}</td>
            `;
          });

          html += "</tr>";
        });

        html += "</tbody></table>";

        container.innerHTML = html;

      } catch (err) {

        container.innerHTML = `
          Failed to load table:
          <br><br>
          ${err.message}
        `;
      }
    }

  </script>

</body>
</html>
